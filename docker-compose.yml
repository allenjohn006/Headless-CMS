version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cms_db
    environment:
      POSTGRES_USER: cmsuser
      POSTGRES_PASSWORD: cmspassword
      POSTGRES_DB: cms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmsuser -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
